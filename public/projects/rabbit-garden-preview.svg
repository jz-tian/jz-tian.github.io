<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <radialGradient id="glow" cx="50%" cy="110%" r="55%">
      <stop offset="0%" stop-color="#d4b87c" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <filter id="blur2">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="#3e6a56"/>
  <rect width="800" height="400" fill="url(#glow)"/>

  <!-- Grain texture suggestion (dots) -->
  <rect width="800" height="400" fill="none" opacity="0.04"
    style="background-image: url('data:image/svg+xml,...')"/>

  <!-- Ledge -->
  <rect x="0" y="310" width="800" height="90" fill="#f5ede0"/>
  <rect x="0" y="307" width="800" height="6"
    fill="url(#ledge-grad)"/>
  <defs>
    <linearGradient id="ledge-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f4efe8"/>
      <stop offset="100%" stop-color="#e0d5c4"/>
    </linearGradient>
  </defs>

  <!-- Botanical stems (left) -->
  <g stroke="white" stroke-width="1.2" stroke-linecap="round" opacity="0.18" fill="none">
    <path d="M60,280 C60,220 60,140 60,60"/>
    <path d="M60,240 C44,224 30,218 18,204"/>
    <path d="M60,200 C76,184 88,178 100,164"/>
    <path d="M60,160 C46,146 34,140 22,126"/>
    <path d="M60,120 C74,106 84,102 94,88"/>
  </g>

  <!-- Botanical stems (right) -->
  <g stroke="white" stroke-width="1.2" stroke-linecap="round" opacity="0.15" fill="none">
    <path d="M740,270 C740,210 740,150 740,80"/>
    <path d="M740,230 C728,216 718,210 710,196"/>
    <path d="M740,190 C752,176 760,170 766,156"/>
    <path d="M740,150 C730,138 722,132 714,118"/>
  </g>

  <!-- Title -->
  <text x="400" y="145" text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-style="italic" font-weight="700"
    font-size="72" fill="#fdf8f2" letter-spacing="-1"
    opacity="0.95">Bunnies!</text>

  <!-- Subtitle -->
  <text x="400" y="178" text-anchor="middle"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-weight="200" font-size="11" fill="#fdf8f2"
    letter-spacing="3" opacity="0.55">CLICK. THEY LOVE THE ATTENTION.</text>

  <!-- Rule ornament -->
  <line x1="355" y1="162" x2="375" y2="162" stroke="white" stroke-width="1" opacity="0.35"/>
  <circle cx="400" cy="162" r="2.5" stroke="white" stroke-width="1" fill="none" opacity="0.35"/>
  <line x1="425" y1="162" x2="445" y2="162" stroke="white" stroke-width="1" opacity="0.35"/>

  <!-- Rabbit 1 — Flemish Giant (grey) -->
  <g transform="translate(82, 200)">
    <!-- ears -->
    <ellipse cx="0" cy="-52" rx="7" ry="22" fill="#c8cdd4" opacity="0.92"/>
    <ellipse cx="18" cy="-50" rx="7" ry="22" fill="#c8cdd4" opacity="0.92"/>
    <ellipse cx="0" cy="-52" rx="3.5" ry="17" fill="#d4b0b8" opacity="0.6"/>
    <ellipse cx="18" cy="-50" rx="3.5" ry="17" fill="#d4b0b8" opacity="0.6"/>
    <!-- head -->
    <ellipse cx="9" cy="-22" rx="18" ry="16" fill="#c8cdd4" opacity="0.95"/>
    <!-- body -->
    <ellipse cx="9" cy="10" rx="22" ry="20" fill="#c8cdd4" opacity="0.92"/>
    <!-- paws -->
    <ellipse cx="-4" cy="26" rx="7" ry="4" fill="#bcc2ca"/>
    <ellipse cx="22" cy="26" rx="7" ry="4" fill="#bcc2ca"/>
    <!-- eyes -->
    <circle cx="3" cy="-24" r="2.5" fill="#304f42"/>
    <circle cx="15" cy="-24" r="2.5" fill="#304f42"/>
    <circle cx="3.8" cy="-24.6" r="0.8" fill="white"/>
    <circle cx="15.8" cy="-24.6" r="0.8" fill="white"/>
    <!-- nose -->
    <ellipse cx="9" cy="-17" rx="2" ry="1.3" fill="#d4a0a8"/>
  </g>

  <!-- Rabbit 2 — Lionhead (golden mane) -->
  <g transform="translate(200, 210)">
    <ellipse cx="0" cy="-48" rx="6" ry="18" fill="#d4aa60" opacity="0.9"/>
    <ellipse cx="16" cy="-48" rx="6" ry="18" fill="#d4aa60" opacity="0.9"/>
    <!-- mane -->
    <ellipse cx="8" cy="-18" rx="24" ry="20" fill="#c89040" opacity="0.5"/>
    <ellipse cx="8" cy="-22" rx="20" ry="16" fill="#e8c878" opacity="0.85"/>
    <!-- head -->
    <ellipse cx="8" cy="-24" rx="14" ry="13" fill="#e8d0a0" opacity="0.95"/>
    <!-- body -->
    <ellipse cx="8" cy="6" rx="18" ry="16" fill="#d8b870"/>
    <!-- paws -->
    <ellipse cx="-2" cy="20" rx="6" ry="3.5" fill="#c8a860"/>
    <ellipse cx="18" cy="20" rx="6" ry="3.5" fill="#c8a860"/>
    <circle cx="2" cy="-26" r="2.2" fill="#304f42"/>
    <circle cx="14" cy="-26" r="2.2" fill="#304f42"/>
    <circle cx="2.7" cy="-26.5" r="0.7" fill="white"/>
    <circle cx="14.7" cy="-26.5" r="0.7" fill="white"/>
    <ellipse cx="8" cy="-20" rx="1.8" ry="1.2" fill="#d4a0a8"/>
  </g>

  <!-- Rabbit 3 — Holland Lop (lop ears, cream) -->
  <g transform="translate(318, 215)">
    <!-- lop ears drooping down -->
    <ellipse cx="-14" cy="0" rx="7" ry="18" fill="#d4b888" opacity="0.9" transform="rotate(-30 -14 0)"/>
    <ellipse cx="28" cy="0" rx="7" ry="18" fill="#d4b888" opacity="0.9" transform="rotate(30 28 0)"/>
    <!-- head -->
    <ellipse cx="7" cy="-20" rx="17" ry="15" fill="#e8d0a8" opacity="0.95"/>
    <!-- body -->
    <ellipse cx="7" cy="5" rx="19" ry="15" fill="#e0c898"/>
    <!-- paws -->
    <ellipse cx="-4" cy="18" rx="6" ry="3.5" fill="#d4bc8c"/>
    <ellipse cx="18" cy="18" rx="6" ry="3.5" fill="#d4bc8c"/>
    <circle cx="1" cy="-22" r="2.2" fill="#304f42"/>
    <circle cx="13" cy="-22" r="2.2" fill="#304f42"/>
    <circle cx="1.7" cy="-22.5" r="0.7" fill="white"/>
    <circle cx="13.7" cy="-22.5" r="0.7" fill="white"/>
    <ellipse cx="7" cy="-16" rx="1.8" ry="1.2" fill="#d4a0a8"/>
  </g>

  <!-- Rabbit 4 — Angora (fluffy white cloud) -->
  <g transform="translate(434, 218)">
    <ellipse cx="0" cy="-50" rx="6" ry="16" fill="#f0e8d8" opacity="0.85"/>
    <ellipse cx="18" cy="-50" rx="6" ry="16" fill="#f0e8d8" opacity="0.85"/>
    <!-- fluffy body (layered circles) -->
    <circle cx="9" cy="-10" r="22" fill="#ede4d0" opacity="0.5"/>
    <circle cx="2" cy="-18" r="16" fill="#f5f0e8" opacity="0.6"/>
    <circle cx="16" cy="-16" r="15" fill="#f5f0e8" opacity="0.6"/>
    <circle cx="9" cy="-10" r="18" fill="#fdf8f2" opacity="0.8"/>
    <!-- face barely visible -->
    <circle cx="5" cy="-18" r="2" fill="#304f42" opacity="0.7"/>
    <circle cx="13" cy="-18" r="2" fill="#304f42" opacity="0.7"/>
    <ellipse cx="9" cy="-13" rx="1.5" ry="1" fill="#d4a0a8" opacity="0.8"/>
    <!-- paws -->
    <ellipse cx="-2" cy="10" rx="7" ry="4" fill="#ede4d0" opacity="0.9"/>
    <ellipse cx="20" cy="10" rx="7" ry="4" fill="#ede4d0" opacity="0.9"/>
  </g>

  <!-- Rabbit 5 — Harlequin (split orange/black) -->
  <g transform="translate(556, 208)">
    <defs>
      <clipPath id="left-half"><rect x="-20" y="-80" width="18" height="120"/></clipPath>
      <clipPath id="right-half"><rect x="-2" y="-80" width="30" height="120"/></clipPath>
    </defs>
    <ellipse cx="0" cy="-52" rx="6.5" ry="20" fill="#e07828" opacity="0.9"/>
    <ellipse cx="16" cy="-52" rx="6.5" ry="20" fill="#1a1a1a" opacity="0.85"/>
    <!-- head left half -->
    <ellipse cx="8" cy="-24" rx="17" ry="15" fill="#e07828" opacity="0.92" clip-path="url(#left-half)"/>
    <!-- head right half -->
    <ellipse cx="8" cy="-24" rx="17" ry="15" fill="#2a2a2a" opacity="0.92" clip-path="url(#right-half)"/>
    <!-- body left -->
    <ellipse cx="8" cy="6" rx="20" ry="17" fill="#2a2a2a" opacity="0.9" clip-path="url(#left-half)"/>
    <!-- body right -->
    <ellipse cx="8" cy="6" rx="20" ry="17" fill="#e07828" opacity="0.9" clip-path="url(#right-half)"/>
    <ellipse cx="-2" cy="22" rx="6.5" ry="3.5" fill="#c06020"/>
    <ellipse cx="18" cy="22" rx="6.5" ry="3.5" fill="#222"/>
    <circle cx="2" cy="-26" r="2.2" fill="white" opacity="0.9"/>
    <circle cx="14" cy="-26" r="2.2" fill="white" opacity="0.9"/>
    <ellipse cx="8" cy="-19" rx="1.8" ry="1.2" fill="#d4a0a8"/>
  </g>

  <!-- Rabbit 6 — Netherland Dwarf (tiny, round, blue-grey) -->
  <g transform="translate(672, 222)">
    <ellipse cx="0" cy="-42" rx="5.5" ry="14" fill="#9aaabb" opacity="0.9"/>
    <ellipse cx="14" cy="-42" rx="5.5" ry="14" fill="#9aaabb" opacity="0.9"/>
    <!-- very round head -->
    <ellipse cx="7" cy="-22" rx="15" ry="14" fill="#aabbc8" opacity="0.95"/>
    <!-- compact round body -->
    <ellipse cx="7" cy="1" rx="16" ry="13" fill="#9aaabb"/>
    <!-- tiny paws -->
    <ellipse cx="-1" cy="13" rx="5.5" ry="3" fill="#8899aa"/>
    <ellipse cx="15" cy="13" rx="5.5" ry="3" fill="#8899aa"/>
    <!-- big eyes -->
    <circle cx="2" cy="-24" r="3" fill="#304f42"/>
    <circle cx="12" cy="-24" r="3" fill="#304f42"/>
    <circle cx="3" cy="-24.8" r="1" fill="white"/>
    <circle cx="13" cy="-24.8" r="1" fill="white"/>
    <ellipse cx="7" cy="-17" rx="1.5" ry="1" fill="#d4a0a8"/>
  </g>
</svg>
